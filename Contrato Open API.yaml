    openapi: 3.1.0
info:
  title: API SIGIBE - Bienestar Estudiantil
  version: 1.0.0
  description: API para la gestión de citas, usuarios, expedientes clínicos y notificaciones en el sistema SIGIBE.
  contact:
    name: Equipo SIGIBE
    email: soporte@sigibe.edu.pe
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT


servers:
  - url: http://localhost:3000
    description: Servidor de desarrollo


tags:
  - name: Autenticación
  - name: Usuarios
  - name: Citas
  - name: Expedientes
  - name: Notificaciones
  - name: Reportes


paths:


  /login:
    post:
      tags: [Autenticación]
      summary: Iniciar sesión
      description: Permite a un usuario autenticarse en el sistema.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Autenticación exitosa
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Credenciales inválidas


  /usuarios:
    get:
      tags: [Usuarios]
      summary: Listar usuarios
      responses:
        '200':
          description: Lista de usuarios
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Usuario'


    post:
      tags: [Usuarios]
      summary: Crear usuario
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevoUsuario'
      responses:
        '201':
          description: Usuario creado correctamente


  /usuarios/{id}:
    get:
      tags: [Usuarios]
      summary: Obtener usuario por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Usuario encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Usuario'


    delete:
      tags: [Usuarios]
      summary: Eliminar usuario
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Usuario eliminado


  /citas:
    get:
      tags: [Citas]
      summary: Listar citas
      responses:
        '200':
          description: Lista de citas
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Cita'


    post:
      tags: [Citas]
      summary: Crear cita
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevaCita'
      responses:
        '201':
          description: Cita creada correctamente


  /citas/{id}:
    get:
      tags: [Citas]
      summary: Obtener cita por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Cita encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Cita'


    put:
      tags: [Citas]
      summary: Actualizar cita
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevaCita'
      responses:
        '200':
          description: Cita actualizada


    delete:
      tags: [Citas]
      summary: Cancelar cita
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Cita eliminada


  /expedientes:
    get:
      tags: [Expedientes]
      summary: Listar expedientes clínicos
      responses:
        '200':
          description: Lista de expedientes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Expediente'


    post:
      tags: [Expedientes]
      summary: Crear expediente clínico
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevoExpediente'
      responses:
        '201':
          description: Expediente creado correctamente


  /expedientes/{id}:
    get:
      tags: [Expedientes]
      summary: Obtener expediente por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Expediente encontrado
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Expediente'


    put:
      tags: [Expedientes]
      summary: Actualizar expediente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevoExpediente'
      responses:
        '200':
          description: Expediente actualizado


    delete:
      tags: [Expedientes]
      summary: Eliminar expediente
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Expediente eliminado


  /notificaciones:
    get:
      tags: [Notificaciones]
      summary: Listar notificaciones
      responses:
        '200':
          description: Lista de notificaciones
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Notificacion'


    post:
      tags: [Notificaciones]
      summary: Crear notificación
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/NuevaNotificacion'
      responses:
        '201':
          description: Notificación creada


  /notificaciones/{id}:
    get:
      tags: [Notificaciones]
      summary: Obtener notificación por ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: Notificación encontrada
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Notificacion'


    delete:
      tags: [Notificaciones]
      summary: Eliminar notificación
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '204':
          description: Notificación eliminada


  /reportes/citas:
    get:
      tags: [Reportes]
      summary: Generar reporte de citas
      responses:
        '200':
          description: Reporte generado
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalCitas:
                    type: integer
                  citasCanceladas:
                    type: integer


components:
  schemas:


    Usuario:
      type: object
      properties:
        id:
          type: integer
        nombre:
          type: string
        rol:
          type: string
          enum: [ESTUDIANTE, ESPECIALISTA, ADMIN]


    NuevoUsuario:
      type: object
      required: [nombre, rol]
      properties:
        nombre:
          type: string
        rol:
          type: string


    Cita:
      type: object
      properties:
        id:
          type: integer
        fecha:
          type: string
          format: date
        hora:
          type: string
        estudianteId:
          type: integer


    NuevaCita:
      type: object
      required: [fecha, hora, estudianteId]
      properties:
        fecha:
          type: string
          format: date
        hora:
          type: string
        estudianteId:
          type: integer


    Expediente:
      type: object
      properties:
        id:
          type: integer
        estudianteId:
          type: integer
        diagnostico:
          type: string
        observaciones:
          type: string
        fechaRegistro:
          type: string
          format: date


    NuevoExpediente:
      type: object
      required: [estudianteId, diagnostico]
      properties:
        estudianteId:
          type: integer
        diagnostico:
          type: string
        observaciones:
          type: string


    Notificacion:
      type: object
      properties:
        id:
          type: integer
        usuarioId:
          type: integer
        mensaje:
          type: string
        leido:
          type: boolean


    NuevaNotificacion:
      type: object
      required: [usuarioId, mensaje]
      properties:
        usuarioId:
          type: integer
        mensaje:
          type: string


    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
        password:
          type: string


    LoginResponse:
      type: object
      properties:
        token:
          type: string
        mensaje:
          type: string
